name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: webhook
          POSTGRES_PASSWORD: webhook
          POSTGRES_DB: webhooks_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://webhook:webhook@localhost:5432/webhooks_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      ADMIN_BOOTSTRAP_SECRET: test-admin-secret
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm db:migrate

      - run: pnpm test:unit

      - run: pnpm test:integration
